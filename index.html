<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Somewhere, A Little</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@300;400&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #020810;
  --border: rgba(255,255,255,0.07);
  --text: rgba(220,225,235,0.88);
  --text-dim: rgba(180,190,210,0.4);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:var(--bg);
  font-family:'Cormorant Garamond',Georgia,serif;
  color:var(--text);
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  user-select:none;
}

/* Canvas */
#canvas{position:fixed;inset:0;cursor:crosshair;overflow:hidden;}
#canvas::before{
  content:'';position:absolute;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;opacity:0.5;z-index:0;
}
#canvas::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:38%;
  background:radial-gradient(ellipse 80% 60% at 50% 100%,rgba(18,55,115,0.2) 0%,transparent 70%);
  pointer-events:none;z-index:0;
}

/* Header */
#header{
  position:fixed;top:0;left:0;right:0;z-index:20;
  padding:20px 22px 0;
  display:flex;justify-content:space-between;align-items:center;
  pointer-events:none;
}
#title{
  font-family:'Cinzel',serif;font-weight:300;font-size:10.5px;
  letter-spacing:.18em;color:rgba(130,162,205,.5);
  text-transform:uppercase;pointer-events:all;cursor:default;
  transition:color .3s;
}
#title.dev-glow{color:rgba(200,180,100,.7);}
#header-right{display:flex;align-items:center;gap:14px;}
#day-counter{font-size:11px;letter-spacing:.12em;color:rgba(130,162,205,.32);font-style:italic;}
#lang-btn{
  font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:.18em;
  color:rgba(130,162,205,.38);background:none;
  border:1px solid rgba(130,162,205,.18);border-radius:10px;
  padding:3px 9px;cursor:pointer;pointer-events:all;
  transition:all .25s;-webkit-appearance:none;
}
#lang-btn:hover{color:rgba(160,195,240,.7);border-color:rgba(130,162,205,.38);}

/* Hint */
#hint{
  position:fixed;bottom:36px;left:0;right:0;text-align:center;
  font-style:italic;font-size:13.5px;color:var(--text-dim);letter-spacing:.07em;
  pointer-events:none;transition:opacity 1.4s ease;z-index:5;
}
#hint.hidden{opacity:0;}

/* Whisper */
#whisper{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  font-style:italic;font-size:15px;color:rgba(160,180,215,.25);
  letter-spacing:.1em;text-align:center;
  pointer-events:none;z-index:6;opacity:0;transition:opacity 2.5s ease;width:80%;
}
#whisper.show{opacity:1;}

/* Ripple */
.ripple{
  position:absolute;transform:translate(-50%,-50%);
  width:10px;height:10px;border-radius:50%;
  border:1px solid rgba(160,200,240,.35);
  pointer-events:none;
  animation:rippleOut 1.2s ease-out forwards;z-index:3;
}
@keyframes rippleOut{
  0%{width:10px;height:10px;opacity:.5;}
  100%{width:90px;height:90px;opacity:0;}
}

/* Lights */
.light{
  position:absolute;transform:translate(-50%,-50%);
  z-index:4;cursor:pointer;
  animation:lightAppear 1.2s cubic-bezier(.16,1,.3,1) forwards;
}
.light.empty{opacity:.48;}
.light.short .light-symbol{opacity:.85;}
.light.long .light-ring{animation-duration:5.8s;}
.light-confused{animation:lightAppear 1.2s cubic-bezier(.16,1,.3,1) forwards,confusedDrift 7s 1.2s ease-in-out infinite;}
.light-nostalgic .light-symbol{animation:lightPulse 4.5s ease-in-out infinite,filmFlicker 6.5s steps(2,end) infinite;}
.light-hopeful .light-symbol{animation:lightPulse 4.5s ease-in-out infinite,hopeFloat 5.5s ease-in-out infinite;}
.light-custom .light-symbol{
  filter:blur(.35px) drop-shadow(0 0 9px var(--gc)) drop-shadow(0 0 22px var(--gc));
}
.light-custom .light-ring{
  border-style:dotted;
  animation:ringExpand 5.4s ease-out infinite;
}
.light.no-anim{animation:none;opacity:1;}
.light.empty.no-anim{opacity:.48;}
@keyframes lightAppear{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.15);}
  60%{opacity:1;transform:translate(-50%,-50%) scale(1.18);}
  100%{opacity:1;transform:translate(-50%,-50%) scale(1);}
}
.light-symbol{
  display:block;text-align:center;line-height:1;
  animation:lightPulse 4.5s ease-in-out infinite;transition:filter .3s;
}
.light:hover .light-symbol{
  filter:drop-shadow(0 0 14px var(--gc)) drop-shadow(0 0 30px var(--gc)) brightness(1.4) !important;
}
@keyframes lightPulse{
  0%,100%{filter:drop-shadow(0 0 5px var(--gc)) drop-shadow(0 0 11px var(--gc));}
  50%{filter:drop-shadow(0 0 10px var(--gc)) drop-shadow(0 0 24px var(--gc)) drop-shadow(0 0 42px var(--gc));}
}
.light-ring{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  border-radius:50%;border:1px solid var(--gc);opacity:0;
  animation:ringExpand 4s ease-out infinite;
}
@keyframes ringExpand{
  0%{width:20px;height:20px;opacity:.4;}
  100%{width:70px;height:70px;opacity:0;}
}
@keyframes confusedDrift{
  0%,100%{margin-left:0;margin-top:0;}
  35%{margin-left:4px;margin-top:-3px;}
  70%{margin-left:-3px;margin-top:2px;}
}
@keyframes filmFlicker{
  0%,92%,100%{opacity:1;}
  94%{opacity:.55;}
  96%{opacity:.82;}
}
@keyframes hopeFloat{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-6px);}
}

/* Onboarding */
#onboarding{
  position:fixed;inset:0;z-index:90;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px;pointer-events:all;
}
.ob-line{
  font-style:italic;font-weight:300;font-size:18px;line-height:2;
  color:rgba(200,215,240,0);text-align:center;letter-spacing:.02em;
  transition:color 1.2s ease;
}
.ob-line.show{color:rgba(200,215,240,.7);}
#ob-breathe{
  margin-top:44px;display:flex;flex-direction:column;
  align-items:center;gap:14px;opacity:0;transition:opacity 1.4s ease;
}
#ob-breathe.show{opacity:1;}
#breathe-dot{
  width:7px;height:7px;border-radius:50%;
  background:rgba(100,180,240,.5);
  box-shadow:0 0 10px rgba(100,180,240,.4),0 0 22px rgba(100,180,240,.2);
  animation:breathe 3.2s ease-in-out infinite;
}
@keyframes breathe{
  0%,100%{transform:scale(1);opacity:.5;box-shadow:0 0 10px rgba(100,180,240,.4);}
  50%{transform:scale(1.7);opacity:1;box-shadow:0 0 18px rgba(100,180,240,.7),0 0 36px rgba(100,180,240,.3);}
}
#ob-cta{font-style:italic;font-size:13px;color:rgba(140,175,220,.42);letter-spacing:.12em;}
#onboarding.dismissed{opacity:0;pointer-events:none;transition:opacity .6s ease;}

/* Sheet overlay */
.sheet-overlay{
  position:fixed;inset:0;
  background:rgba(1,5,14,.7);backdrop-filter:blur(9px);-webkit-backdrop-filter:blur(9px);
  z-index:50;display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .38s ease;
}
.sheet-overlay.visible{opacity:1;pointer-events:all;}
.sheet-panel{
  width:100%;max-width:480px;
  background:linear-gradient(168deg,rgba(5,16,38,.97) 0%,rgba(3,11,26,.99) 100%);
  border-top:1px solid var(--border);border-radius:22px 22px 0 0;
  padding:26px 26px 40px;
  transform:translateY(28px);transition:transform .38s cubic-bezier(.16,1,.3,1);
  position:relative;
}
.sheet-overlay.visible .sheet-panel{transform:translateY(0);}
.modal-handle{
  width:34px;height:3px;background:rgba(255,255,255,.13);
  border-radius:2px;margin:0 auto 24px;
}
.close-x{
  position:absolute;top:20px;right:22px;
  background:none;border:none;color:rgba(160,180,215,.3);
  font-size:18px;cursor:pointer;padding:4px;transition:color .2s;line-height:1;
}
.close-x:hover{color:rgba(160,180,215,.7);}

/* Question modal */
#question-text{
  font-style:italic;font-weight:300;font-size:20px;line-height:1.55;
  color:rgba(210,220,240,.9);margin-bottom:22px;letter-spacing:.01em;
}
#answer-input{
  width:100%;background:rgba(255,255,255,.035);
  border:1px solid rgba(255,255,255,.1);border-radius:10px;
  padding:13px 15px;color:var(--text);
  font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:300;line-height:1.5;
  resize:none;height:88px;outline:none;transition:border-color .3s;-webkit-appearance:none;
}
#answer-input::placeholder{color:rgba(170,185,210,.28);font-style:italic;}
#answer-input:focus{border-color:rgba(100,160,220,.32);}
#emotion-label{font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--text-dim);margin:18px 0 10px;}
#emotion-grid{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:24px;}
#custom-feeling-input{
  width:100%;background:rgba(255,255,255,.028);
  border:1px solid rgba(255,255,255,.085);border-radius:10px;
  padding:10px 13px;margin:-12px 0 22px;
  color:var(--text);
  font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:300;
  outline:none;transition:border-color .3s;-webkit-appearance:none;
}
#custom-feeling-input::placeholder{color:rgba(170,185,210,.26);font-style:italic;}
#custom-feeling-input:focus{border-color:rgba(100,160,220,.28);}
.pref-intro,.intent-intro{display:none;}
.pref-intro.visible,.intent-intro.visible{display:block;}
.pref-title{
  font-style:italic;font-weight:300;font-size:20px;line-height:1.55;
  color:rgba(210,220,240,.9);margin-bottom:8px;letter-spacing:.01em;
}
.pref-subtitle{font-style:italic;font-size:14px;line-height:1.55;color:var(--text-dim);margin-bottom:18px;}
.pref-grid,.intent-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px;}
.pref-chip{
  padding:7px 13px;border-radius:18px;
  border:1px solid rgba(255,255,255,.1);background:transparent;
  color:rgba(195,208,230,.6);
  font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic;letter-spacing:.04em;
  cursor:pointer;transition:all .2s;-webkit-appearance:none;
}
.pref-chip.active{border-color:rgba(105,165,225,.45);background:rgba(105,165,225,.1);color:rgba(220,235,255,.92);}
.pref-chip[data-depth="2"].active{border-color:rgba(110,181,200,.45);background:rgba(110,181,200,.1);}
.pref-chip[data-depth="4"].active{border-color:rgba(196,135,90,.5);background:rgba(196,135,90,.1);}
#pref-start-btn{
  width:100%;padding:14px;background:rgba(255,255,255,.055);
  border:1px solid rgba(255,255,255,.11);border-radius:12px;
  color:rgba(210,220,240,.75);
  font-family:'Cormorant Garamond',serif;font-size:16px;letter-spacing:.13em;
  cursor:pointer;transition:all .28s;-webkit-appearance:none;
}
#intent-start-btn{
  width:100%;padding:14px;background:rgba(255,255,255,.055);
  border:1px solid rgba(255,255,255,.11);border-radius:12px;
  color:rgba(210,220,240,.75);
  font-family:'Cormorant Garamond',serif;font-size:16px;letter-spacing:.13em;
  cursor:pointer;transition:all .28s;-webkit-appearance:none;
}
#pref-start-btn:hover,#pref-start-btn:active{
  background:rgba(255,255,255,.09);border-color:rgba(100,160,220,.28);color:rgba(220,232,252,1);
}
#intent-start-btn:hover,#intent-start-btn:active{
  background:rgba(255,255,255,.09);border-color:rgba(100,160,220,.28);color:rgba(220,232,252,1);
}
.emotion-tag{
  padding:6px 13px;border-radius:18px;
  border:1px solid rgba(255,255,255,.1);background:transparent;
  color:rgba(195,208,230,.6);
  font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic;letter-spacing:.04em;
  cursor:pointer;transition:all .2s;-webkit-appearance:none;
}
.emotion-tag:hover{border-color:var(--tc);color:var(--tc);}
.emotion-tag.active{
  border-color:var(--tc);background:rgba(var(--tr),.13);color:var(--tc);
  box-shadow:0 0 11px rgba(var(--tr),.18);
}
#submit-btn{
  width:100%;padding:14px;background:rgba(255,255,255,.055);
  border:1px solid rgba(255,255,255,.11);border-radius:12px;
  color:rgba(210,220,240,.75);
  font-family:'Cormorant Garamond',serif;font-size:16px;letter-spacing:.13em;
  cursor:pointer;transition:all .28s;-webkit-appearance:none;
}
#submit-btn:hover,#submit-btn:active{
  background:rgba(255,255,255,.09);border-color:rgba(100,160,220,.28);color:rgba(220,232,252,1);
}
#skip-question-btn{
  display:block;margin:13px auto 0;background:none;border:none;
  color:rgba(160,180,215,.38);
  font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic;letter-spacing:.08em;
  cursor:pointer;transition:color .2s;-webkit-appearance:none;
}
#skip-question-btn:hover,#skip-question-btn:active{color:rgba(180,205,235,.72);}
#limit-msg{
  text-align:center;padding:28px 0 8px;
  font-style:italic;font-size:16px;color:var(--text-dim);line-height:1.75;
}

/* Memory panel */
#mem-date{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:rgba(130,162,205,.4);margin-bottom:16px;}
#mem-question{font-style:italic;font-size:17px;font-weight:300;line-height:1.6;color:rgba(200,215,240,.65);margin-bottom:16px;}
#mem-divider{width:28px;height:1px;background:rgba(255,255,255,.1);margin-bottom:16px;}
#mem-answer{font-size:16px;font-weight:300;line-height:1.7;color:rgba(210,225,245,.85);min-height:24px;}
#mem-answer.empty{color:var(--text-dim);font-style:italic;}
#mem-emotion-tag{display:inline-block;margin-top:20px;padding:5px 14px;border-radius:16px;border:1px solid;font-style:italic;font-size:13px;}
#mem-close-btn{
  display:block;width:100%;margin-top:26px;padding:13px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:11px;
  color:rgba(180,195,220,.5);
  font-family:'Cormorant Garamond',serif;font-size:15px;letter-spacing:.1em;
  cursor:pointer;-webkit-appearance:none;transition:all .2s;
}
#mem-close-btn:hover{color:rgba(180,195,220,.85);border-color:rgba(255,255,255,.18);}

/* Bottle */
#bottle{
  position:fixed;bottom:78px;right:22px;z-index:22;
  cursor:pointer;opacity:0;pointer-events:none;transition:filter .3s;
  animation:floatBottle 6s ease-in-out infinite;
}
#bottle.visible{
  pointer-events:all;
  animation:bottleIn 1.1s cubic-bezier(.16,1,.3,1) forwards,floatBottle 6s 1.1s ease-in-out infinite;
}
@keyframes bottleIn{0%{opacity:0;transform:translateY(20px);}100%{opacity:1;transform:translateY(0);}}
@keyframes floatBottle{0%,100%{transform:translateY(0) rotate(-3deg);}50%{transform:translateY(-11px) rotate(3deg);}}
#bottle:hover{filter:brightness(1.35);}
#bottle-icon{font-size:30px;filter:drop-shadow(0 0 10px rgba(90,195,170,.5));}

/* Center overlay */
.center-overlay{
  position:fixed;inset:0;
  background:rgba(1,5,14,.78);backdrop-filter:blur(13px);-webkit-backdrop-filter:blur(13px);
  z-index:60;display:flex;align-items:center;justify-content:center;padding:28px;
  opacity:0;pointer-events:none;transition:opacity .38s ease;
}
.center-overlay.visible{opacity:1;pointer-events:all;}
#bottle-card{
  max-width:330px;width:100%;
  background:linear-gradient(152deg,rgba(4,16,38,.98) 0%,rgba(3,12,26,.99) 100%);
  border:1px solid rgba(90,195,170,.13);border-radius:18px;padding:36px 30px 30px;
  text-align:center;
  transform:scale(.88) translateY(12px);transition:transform .42s cubic-bezier(.16,1,.3,1);
  box-shadow:0 0 60px rgba(70,155,135,.1);
}
.center-overlay.visible #bottle-card{transform:scale(1) translateY(0);}
#bottle-icon-lg{font-size:40px;display:block;margin-bottom:22px;filter:drop-shadow(0 0 13px rgba(90,195,170,.55));}
#bottle-message{font-style:italic;font-weight:300;font-size:17.5px;line-height:1.78;color:rgba(195,218,228,.88);margin-bottom:22px;}
#bottle-source{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:rgba(90,195,170,.5);}
#bottle-close-btn{
  display:block;margin:26px auto 0;background:none;
  border:1px solid rgba(90,195,170,.18);border-radius:18px;padding:8px 26px;
  color:rgba(90,195,170,.55);
  font-family:'Cormorant Garamond',serif;font-size:14px;letter-spacing:.11em;
  cursor:pointer;transition:all .22s;-webkit-appearance:none;
}
#bottle-close-btn:hover{background:rgba(90,195,170,.07);color:rgba(90,195,170,.88);}

/* End of night */
#night-end{
  position:fixed;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:10px;
  pointer-events:none;z-index:80;opacity:0;transition:opacity 1.2s ease;
}
#night-end.show{opacity:1;}
.ne-line{font-style:italic;font-weight:300;font-size:17px;color:rgba(180,200,230,.55);letter-spacing:.06em;text-align:center;}
.ne-line.small{font-size:14.5px;color:rgba(180,200,230,.42);max-width:320px;line-height:1.55;}

/* Dev panel */
#dev-panel{
  position:fixed;bottom:70px;left:18px;z-index:100;
  background:rgba(5,18,40,.96);border:1px solid rgba(200,180,100,.25);
  border-radius:14px;padding:16px 18px;
  display:none;flex-direction:column;gap:8px;min-width:180px;
  box-shadow:0 0 30px rgba(200,180,100,.08);
}
#dev-panel.open{display:flex;}
#dev-panel h4{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.3em;color:rgba(200,180,100,.55);text-transform:uppercase;margin-bottom:4px;}
.dev-btn{
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);
  border-radius:7px;padding:8px 12px;color:rgba(200,215,240,.65);
  font-family:'Cormorant Garamond',serif;font-size:14px;cursor:pointer;text-align:left;
  transition:background .2s;-webkit-appearance:none;
}
.dev-btn:hover{background:rgba(255,255,255,.08);}
.dev-btn.danger{border-color:rgba(200,80,80,.25);color:rgba(220,130,130,.7);}

/* Toast */
#toast{
  position:fixed;top:58px;left:50%;
  transform:translateX(-50%) translateY(-8px);
  background:rgba(5,16,38,.95);border:1px solid rgba(255,255,255,.09);
  border-radius:22px;padding:9px 20px;
  font-style:italic;font-size:13.5px;color:var(--text-dim);
  z-index:200;pointer-events:none;opacity:0;
  transition:all .28s ease;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Stars */
@keyframes starTwinkle{
  0%,100%{opacity:var(--so,.08);transform:scale(1);}
  50%{opacity:calc(var(--so,.08)*3);transform:scale(1.5);}
}
</style>
</head>
<body>

<div id="canvas"></div>

<div id="header">
  <span id="title">SOMEWHERE, A LITTLE</span>
  <div id="header-right">
    <span id="day-counter"></span>
    <button id="lang-btn">中文</button>
  </div>
</div>

<div id="hint"></div>
<div id="whisper"></div>

<div id="onboarding">
  <p class="ob-line" id="ob-l1"></p>
  <p class="ob-line" id="ob-l2"></p>
  <p class="ob-line" id="ob-l3"></p>
  <div id="ob-breathe">
    <div id="breathe-dot"></div>
    <span id="ob-cta"></span>
  </div>
</div>

<div class="sheet-overlay" id="overlay">
  <div class="sheet-panel" id="modal">
    <button class="close-x" id="close-btn">✕</button>
    <div class="modal-handle"></div>
    <div id="modal-inner">
      <div class="pref-intro" id="pref-intro">
        <p class="pref-title" id="pref-title"></p>
        <p class="pref-subtitle" id="pref-subtitle"></p>
        <div class="pref-grid" id="pref-grid"></div>
        <button id="pref-start-btn"></button>
      </div>
      <div class="intent-intro" id="intent-intro">
        <p class="pref-title" id="intent-title"></p>
        <p class="pref-subtitle" id="intent-subtitle"></p>
        <div class="intent-grid" id="intent-grid"></div>
        <button id="intent-start-btn"></button>
      </div>
      <div id="question-inner">

let lights=[], todayCount=0, currentLang='en';
let pendingX=0, pendingY=0, selectedEmo=null, selectedFeelingLabel='', currentQ='', currentQMeta=null;
let isFirstVisit=false, onboardingDone=false;
let userProfile=null, dailyIntent=null;
let customFeelings=[];

function todayStr(){ return new Date().toISOString().slice(0,10); }

function loadState(){
  try{ lights=JSON.parse(localStorage.getItem(SK.lights))||[]; }catch{ lights=[]; }
  try{ userProfile=JSON.parse(localStorage.getItem(SK.profile))||null; }catch{ userProfile=null; }
  try{ dailyIntent=JSON.parse(localStorage.getItem(SK.dailyIntent))||null; }catch{ dailyIntent=null; }
  try{ customFeelings=JSON.parse(localStorage.getItem(SK.customFeelings))||[]; }catch{ customFeelings=[]; }
  if(!Array.isArray(customFeelings)) customFeelings=[];
  if(dailyIntent?.date!==todayStr()) dailyIntent=null;
  if(userProfile){
    userProfile.scores={...defaultScores(),...(userProfile.scores||{})};
    userProfile.categories=userProfile.categories||['self','daily','memory'];
    userProfile.preferredDepth=userProfile.preferredDepth||3;
    userProfile.seenQuestionIds=userProfile.seenQuestionIds||[];
  }
  const d=localStorage.getItem(SK.date);
  if(d===todayStr()){ todayCount=parseInt(localStorage.getItem(SK.count)||'0',10); }
  else{ todayCount=0; localStorage.setItem(SK.date,todayStr()); localStorage.setItem(SK.count,'0'); }
  const sl=localStorage.getItem(SK.lang);
  currentLang=sl||(navigator.language.startsWith('zh')?'zh':'en');
  isFirstVisit=!localStorage.getItem(SK.visited)&&lights.length===0;
}

function saveState(){
  try{
    localStorage.setItem(SK.lights,JSON.stringify(lights));
    localStorage.setItem(SK.date,todayStr());
    localStorage.setItem(SK.count,String(todayCount));
  }catch{}
}

function defaultScores(){
  return {self:1,memory:1,relationship:1,future:1,art:1,strange:1,daily:1,philosophy:1,city:1,calm:1,game:0};
}

function saveProfile(){
  if(userProfile) localStorage.setItem(SK.profile,JSON.stringify(userProfile));
}

function saveDailyIntent(){
  if(dailyIntent) localStorage.setItem(SK.dailyIntent,JSON.stringify(dailyIntent));
}

function saveCustomFeeling(word){
  const clean=(word||'').trim().slice(0,12);
  if(!clean) return;
  customFeelings=[clean,...customFeelings.filter(item=>item!==clean)].slice(0,3);
  localStorage.setItem(SK.customFeelings,JSON.stringify(customFeelings));
}

function createProfileFromPrefs(selected){
  const scores=defaultScores();
  const categories=[];
  let depthTotal=0, depthCount=0;
  let surprise=selected.includes('surprise')||selected.length===0;

  selected.forEach(id=>{
    const pref=PREF_OPTIONS.find(p=>p.id===id);
    if(!pref) return;
    if(pref.category){
      scores[pref.category]=(scores[pref.category]||0)+3;
      if(!categories.includes(pref.category)) categories.push(pref.category);
    }
    if(pref.depth){ depthTotal+=pref.depth; depthCount++; }
  });

  userProfile={
    categories:categories.length?categories:['self','daily','memory'],
    preferredDepth:depthCount?Math.round(depthTotal/depthCount):3,
    surprise,
    scores,
    seenQuestionIds:[]
  };
  saveProfile();
  dailyIntent={date:todayStr(),mode:'first',categories:null,useProfile:true};
  saveDailyIntent();
}

function lightSize(ans){
  const l=(ans||'').length;
  if(l===0)   return{fs:'17px',rw:'28px',rh:'28px'};
  if(l<30)    return{fs:'21px',rw:'38px',rh:'38px'};
  if(l<100)   return{fs:'25px',rw:'48px',rh:'48px'};
  return             {fs:'29px',rw:'58px',rh:'58px'};
}

function answerShape(ans){
  const l=(ans||'').length;
  if(l===0) return 'empty';
  if(l<30) return 'short';
  if(l>120) return 'long';
  return 'medium';
}

function renderLight(light,animate){
  const em=EMOTIONS.find(e=>e.id===(light.visualType||light.emotion))||EMOTIONS[4];
  const sym=light.symbol||em.symbols[0];
  const sz=lightSize(light.answer);
  const visual=light.visualType||light.emotion||'calm';
  const el=document.createElement('div');
  el.className=`light light-${visual} ${answerShape(light.answer)}`+(animate?'':' no-anim');
  el.style.left=(light.x*100)+'%';
  el.style.top=(light.y*100)+'%';
  el.style.setProperty('--gc',em.color);
  el.dataset.id=light.id;
  el.innerHTML=`<div class="light-ring" style="width:${sz.rw};height:${sz.rh};--gc:${em.color};animation-delay:${Math.random()*4}s"></div>
<span class="light-symbol" style="font-size:${sz.fs};color:${em.color};--gc:${em.color}">${sym}</span>`;
  el.addEventListener('click',e=>{e.stopPropagation();openMemory(light);});
  document.getElementById('canvas').appendChild(el);
}

function createDailyIntent(id){
  const intent=DAILY_INTENT_OPTIONS.find(item=>item.id===id)||DAILY_INTENT_OPTIONS[0];
  dailyIntent={
    date:todayStr(),
    mode:intent.id,
    categories:intent.categories,
    minDepth:intent.minDepth,
    maxDepth:intent.maxDepth,
    surprise:!!intent.surprise,
    useProfile:intent.id==='usual'
  };
  saveDailyIntent();
}

function weightedPick(items){
  const total=items.reduce((sum,item)=>sum+Math.max(0.1,item.weight||1),0);
  let roll=Math.random()*total;
  for(const item of items){
    roll-=Math.max(0.1,item.weight||1);
    if(roll<=0) return item.value;
  }
  return items[items.length-1]?.value;
}

function topProfileCategories(){
  return Object.entries(userProfile?.scores||defaultScores())
    .sort((a,b)=>b[1]-a[1])
    .slice(0,4)
    .map(([cat])=>cat);
}

function allowedNicheCats(){
  return new Set([...(userProfile?.categories||[]),...topProfileCategories(),...(dailyIntent?.categories||[])]);
}

function canUseQuestion(q,cats=allowedNicheCats()){
  return !q.niche||q.category.some(cat=>cats.has(cat));
}

function depthFits(q,intent=dailyIntent){
  if(!intent) return true;
  if(intent.minDepth&&q.depth<intent.minDepth) return false;
  if(intent.maxDepth&&q.depth>intent.maxDepth) return false;
  return true;
}

function pickQuestion(){
  if(!userProfile) createProfileFromPrefs([]);
  const answeredIds=lights.map(light=>light.questionId).filter(id=>id&&id!=='first');
  const seen=new Set([...(userProfile.seenQuestionIds||[]),...answeredIds]);
  const universal=QUESTION_BANK.filter(q=>!q.niche);
  const highCats=topProfileCategories();
  const adjacent=[...new Set(highCats.flatMap(cat=>ADJACENT_CATEGORIES[cat]||[]))];
  const nicheCats=allowedNicheCats();
  const mode=Math.random();
  let candidates;

  if(dailyIntent?.surprise){
    candidates=universal;
  }else if(dailyIntent?.categories&&mode<0.6){
    candidates=QUESTION_BANK.filter(q=>q.category.some(cat=>dailyIntent.categories.includes(cat))&&depthFits(q)&&canUseQuestion(q,nicheCats));
  }else if(mode<0.85){
    candidates=QUESTION_BANK.filter(q=>q.category.some(cat=>highCats.includes(cat))&&canUseQuestion(q,nicheCats));
  }else{
    candidates=QUESTION_BANK.filter(q=>q.category.some(cat=>adjacent.includes(cat))&&!q.niche);
  }

  candidates=candidates.filter(q=>!seen.has(q.id));
  if(candidates.length===0) candidates=QUESTION_BANK.filter(q=>canUseQuestion(q,nicheCats)&&depthFits(q));
  if(candidates.length===0) candidates=universal;

  const preferredDepth=userProfile.preferredDepth||3;
  const q=weightedPick(candidates.map(q=>({
    value:q,
    weight:1/(1+Math.abs(q.depth-preferredDepth))
  })))||QUESTION_BANK[0];

  userProfile.seenQuestionIds=[...(userProfile.seenQuestionIds||[]),q.id].slice(-24);
  saveProfile();
  return q;
}

function showQuestion(){
  const firstQDone=localStorage.getItem(SK.firstQ);
  currentQMeta=(!firstQDone&&lights.length===0)?null:pickQuestion();
  currentQ=currentQMeta?currentQMeta[currentLang]:t('firstQ');
  document.getElementById('question-text').textContent='\u201c'+currentQ+'\u201d';
  document.getElementById('answer-input').value='';
  document.getElementById('custom-feeling-input').value='';
  document.getElementById('skip-question-btn').style.display=currentQMeta?'block':'none';
  selectedEmo=null; selectedFeelingLabel=''; buildEmotionGrid();
  document.getElementById('pref-intro').classList.remove('visible');
  document.getElementById('intent-intro').classList.remove('visible');
  document.getElementById('question-inner').style.display='block';
}

function updateProfileAfterAnswer(light){
  if(!userProfile||!currentQMeta) return;
  const length=(light.answer||'').length;
  const emotionWeight=['dark','nostalgic','confused','hopeful'].includes(light.emotion)?0.35:0.15;
  const answerWeight=length>120?0.7:length>40?0.35:length>0?0.12:0;
  const delta=emotionWeight+answerWeight;

  currentQMeta.category.forEach(cat=>{
    userProfile.scores[cat]=(userProfile.scores[cat]||0)+delta;
  });
  userProfile.preferredDepth=Math.round((userProfile.preferredDepth*4+currentQMeta.depth)/5);
  saveProfile();
}

// ── END OF NIGHT ──────────────────────────────────────────────────────────────

function unique(items){
  return [...new Set(items.filter(Boolean))];
}

function topCategoriesFor(lightsForToday){
  const counts={};
  lightsForToday.forEach(light=>{
    (light.questionCategories||[]).forEach(cat=>{
      counts[cat]=(counts[cat]||0)+1;
    });
  });
  if(dailyIntent?.mode==='unknown') counts.unknown=(counts.unknown||0)+1;
  return Object.entries(counts)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,3)
    .map(([cat])=>CATEGORY_LABELS[currentLang][cat]||cat);
}

function closingLineFor(lightsForToday,cats,avgDepth,totalAnswerLength){
  const hasUnknown=cats.some(cat=>['unknown','philosophy','strange'].includes(cat));
  const hasRelationship=cats.includes('relationship');
  if(totalAnswerLength<20) return currentLang==='zh'?'没说太多也没关系，这盏灯已经在这里了。':'Not much had to be said. The light is still here.';
  if(totalAnswerLength>220) return currentLang==='zh'?'这盏灯停留得久了一点。':'This light stayed a little longer.';
  if(hasUnknown&&avgDepth>=3) return currentLang==='zh'?'黑暗不用一次看完。':'The dark does not have to be seen all at once.';
  if(hasRelationship) return currentLang==='zh'?'有些回声，不只属于你一个人。':'Some echoes do not belong to you alone.';
  if(avgDepth<=2) return currentLang==='zh'?'今天已经够了，轻一点也很好。':'This is enough for tonight. Soft counts, too.';
  return currentLang==='zh'?'明天也许可以去另一片黑暗。':'Tomorrow can belong to another part of the dark.';
}

function nightSummary(){
  const todays=lights.filter(light=>light.date===todayStr()).slice(-DAILY_LIMIT);
  if(todays.length===0) return t('endNight');

  const feelings=unique(todays.map(light=>light.feeling)).slice(0,3);
  const rawCats=unique(todays.flatMap(light=>light.questionCategories||[]));
  if(dailyIntent?.mode==='unknown') rawCats.push('unknown');
  const cats=topCategoriesFor(todays);
  const avgDepth=todays.reduce((sum,light)=>sum+(light.questionDepth||3),0)/todays.length;
  const totalAnswerLength=todays.reduce((sum,light)=>sum+(light.answer||'').length,0);
  const line3=closingLineFor(todays,rawCats,avgDepth,totalAnswerLength);

  if(currentLang==='zh'){
    return [
      `今晚的海留下了：${feelings.join('、') || '说不清'}。`,
      `它更靠近：${cats.join(' / ') || '自己'}。`,
      line3
    ];
  }
  return [
    `Tonight left: ${feelings.join(', ') || 'something unclear'}.`,
    `It drifted toward: ${cats.join(' / ') || 'self'}.`,
    line3
  ];
}

    const em=EMOTIONS[i%EMOTIONS.length];
    const l={id:Date.now()+i,x:.12+Math.random()*.76,y:.18+Math.random()*.64,
      emotion:em.id,answer:'',question:'',
      visualType:em.id,feeling:em[currentLang],
      symbol:em.symbols[Math.floor(Math.random()*em.symbols.length)],date:todayStr()};
    lights.push(l); renderLight(l,false);
  }
  saveState(); checkBottle();
  document.getElementById('dev-panel').classList.remove('open');
  showToast('6 lights added.');
});
document.getElementById('dev-bottle').addEventListener('click',()=>{
  while(lights.length<BOTTLE_AT){
    const em=EMOTIONS[lights.length%EMOTIONS.length];
    lights.push({id:Date.now()+lights.length,x:.1+Math.random()*.8,y:.1+Math.random()*.8,
      emotion:em.id,answer:'',question:'',
      visualType:em.id,feeling:em[currentLang],
      symbol:em.symbols[0],date:todayStr()});
  }
  saveState(); renderAllLights(); checkBottle();
  document.getElementById('dev-panel').classList.remove('open');
  showToast('bottle threshold reached.');
});

// ── INIT ──────────────────────────────────────────────────────────────────────

loadState();
applyLanguage();
createStars();
renderAllLights();
updateCounter();
updateHint();
checkBottle();
resetIdle();

if(isFirstVisit){
  startOnboarding();
}else{
  document.getElementById('onboarding').style.display='none';
  onboardingDone=true;
}
</script>
</body>
</html>
