<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Somewhere, A Little</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@300;400&display=swap" rel="stylesheet"/>
<link rel="manifest" href="manifest.webmanifest"/>
<meta name="theme-color" content="#020810"/>
<link rel="apple-touch-icon" href="icons/icon-512.png"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<div id="canvas"></div>

<div id="header">
  <span id="title"><span id="title-main">SOMEWHERE</span><span id="title-sub"> A LITTLE</span></span>
  <div id="header-right">
    <span id="day-counter"></span>
    <button id="tide-btn"></button>
    <button id="feedback-btn"></button>
    <button id="lang-btn">中文</button>
  </div>
</div>

<div id="hint"></div>
<div id="whisper"></div>

<div id="onboarding">
  <p class="ob-line" id="ob-l1"></p>
  <p class="ob-line" id="ob-l2"></p>
  <p class="ob-line" id="ob-l3"></p>
  <div id="ob-breathe">
    <div id="breathe-dot"></div>
    <span id="ob-cta"></span>
  </div>
</div>

<div class="sheet-overlay" id="overlay">
  <div class="sheet-panel" id="modal">
    <button class="close-x" id="close-btn">✕</button>
    <div class="modal-handle"></div>
    <div id="modal-inner">
      <div class="pref-intro" id="pref-intro">
        <p class="pref-title" id="pref-title"></p>
        <p class="pref-subtitle" id="pref-subtitle"></p>
        <div class="pref-grid" id="pref-grid"></div>
        <button id="pref-start-btn"></button>
      </div>
      <div class="intent-intro" id="intent-intro">
        <p class="pref-title" id="intent-title"></p>
        <p class="pref-subtitle" id="intent-subtitle"></p>
        <div class="intent-grid" id="intent-grid"></div>
        <p class="tide-color-title" id="tide-color-title"></p>
        <div class="tide-color-grid" id="tide-color-grid"></div>
        <p class="tide-color-note" id="tide-color-note"></p>
        <button id="intent-start-btn"></button>
      </div>
      <div id="question-inner">
      <p id="question-text"></p>
      <p id="repeat-note"></p>
      <p id="previous-answer"></p>
      <textarea id="answer-input" rows="3"></textarea>
      <p id="emotion-label"></p>
      <div id="emotion-grid"></div>
      <input id="custom-feeling-input" maxlength="12"/>
      <button id="skip-question-btn"></button>
      <button id="no-feeling-btn"></button>
      <button id="submit-btn"></button>
      </div>
    </div>
    <div id="optional-inner" style="display:none">
      <p id="optional-msg"></p>
      <button id="optional-yes-btn"></button>
      <button id="optional-no-btn"></button>
    </div>
    <div id="limit-inner" style="display:none">
      <p id="limit-msg"></p>
    </div>
  </div>
</div>

<div class="sheet-overlay" id="mem-overlay">
  <div class="sheet-panel">
    <button class="close-x" id="mem-x">✕</button>
    <div class="modal-handle"></div>
    <p id="mem-date"></p>
    <p id="mem-question"></p>
    <div id="mem-divider"></div>
    <p id="mem-answer"></p>
    <span id="mem-emotion-tag"></span>
    <button id="mem-bottle-btn"></button>
    <button id="mem-close-btn"></button>
  </div>
</div>

<div class="sheet-overlay" id="tide-overlay">
  <div class="sheet-panel">
    <button class="close-x" id="tide-x">✕</button>
    <div class="modal-handle"></div>
    <p class="pref-title" id="tide-title"></p>
    <div id="tide-stats"></div>
    <button id="tide-random-btn"></button>
    <button id="tide-close-btn"></button>
  </div>
</div>

<div id="bottle"><span id="bottle-icon">🫙</span></div>

<div class="center-overlay" id="bottle-overlay">
  <div id="bottle-card">
    <span id="bottle-icon-lg">🫙</span>
    <p id="bottle-message"></p>
    <p id="bottle-source"></p>
    <button id="bottle-close-btn"></button>
  </div>
</div>

<div id="night-end">
  <p class="ne-line" id="ne-l1"></p>
  <p class="ne-line" id="ne-l2"></p>
  <p class="ne-line small" id="ne-l3"></p>
</div>

<div id="dev-panel">
  <h4>— dev —</h4>
  <button class="dev-btn" id="dev-add6">add 6 test lights</button>
  <button class="dev-btn" id="dev-bottle">trigger bottle</button>
  <button class="dev-btn" id="dev-resetday">reset today's count</button>
  <button class="dev-btn danger" id="dev-reset">reset everything</button>
  <button class="dev-btn" id="dev-close">close</button>
</div>

<div id="toast"></div>

<script src="data.js"></script>
<script src="app.js"></script>
<script>
if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./service-worker.js")
        .catch((error) => {
          console.log("Service worker registration failed:", error);
        });
    });
  }
</script>
</body>
</html>
